<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>퐁당샤브 관리 시스템</title>
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <style>
    :root { 
      --toss-blue: #0050FF; --toss-bg: #F2F4F6; --toss-white: #FFFFFF;
      --toss-gray-100: #F9FAFB; --toss-gray-200: #E5E8EB; --toss-gray-600: #4E5968;
      --toss-text: #191F28; --danger: #F04452;
    }
    body { font-family: -apple-system, sans-serif; margin: 0; background: var(--toss-bg); color: var(--toss-text); -webkit-tap-highlight-color: transparent; padding-top: 60px; padding-bottom: 90px; overflow-x: hidden; }
    .header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; z-index: 100; box-sizing: border-box; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--toss-blue); }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--toss-white); display: flex; border-top: 1px solid var(--toss-gray-200); z-index: 1000; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--toss-gray-600); cursor: pointer; }
    .nav-item.active { color: var(--toss-blue); }
    .container { padding: 16px; max-width: 600px; margin: 0 auto; display: none; box-sizing: border-box; }
    .container.active { display: block; }
    .card { background: var(--toss-white); border-radius: 24px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .action-group { display: flex; gap: 10px; margin-top: 16px; width: 100%; box-sizing: border-box; }
    .btn-ai, .btn-cancel { flex: 1; height: 58px; display: flex; align-items: center; justify-content: center; border-radius: 16px; font-weight: 600; font-size: 16px; cursor: pointer; border: none; }
    .btn-ai { background: var(--toss-blue); color: white; }
    .btn-cancel { background: var(--toss-gray-200); color: var(--toss-text); }
    .btn-main { background: var(--toss-blue); color: white; border: none; border-radius: 16px; padding: 18px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 20px; }
    .table-wrapper { margin: 20px -24px 0; overflow-x: auto; border-top: 1px solid var(--toss-gray-200); }
    table { width: 100%; border-collapse: collapse; min-width: 400px; table-layout: fixed; }
    th, td { padding: 12px 4px; text-align: center; font-size: 12px; border-bottom: 1px solid var(--toss-gray-100); }
    td input { width: 95%; border: none; background: var(--toss-gray-100); padding: 8px; border-radius: 8px; font-size: 12px; text-align: center; outline: none; box-sizing: border-box; }
    .x-btn { width: 24px; height: 24px; border-radius: 50%; border: none; background: #FFEBEE; color: var(--danger); font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    .x-btn.active { background: var(--toss-gray-200); color: var(--toss-gray-600); }
    tr.row-off { opacity: 0.3; filter: grayscale(1); }
    .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 2000; }
    .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 24px 24px 0 0; padding: 24px; box-sizing: border-box; transition: bottom 0.3s ease; z-index: 2001; }
    .bottom-sheet.show { bottom: 0; }
    #loading { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <div class="header"><div class="header-title">퐁당샤브</div></div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="nav('receipt')"><span>🧾</span><span>영수증</span></div>
    <div class="nav-item" onclick="nav('attendance')"><span>⏰</span><span>근태관리</span></div>
    <div class="nav-item" onclick="nav('settle')"><span>💰</span><span>마감정산</span></div>
  </div>

  <div id="loading"><p id="loadText" style="color:var(--toss-blue); font-weight:700;">작업 처리 중...</p></div>

  <div id="receiptCont" class="container active">
    <div class="card">
      <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 20px;">영수증 등록</h2>
      <img id="imgPreview" style="width:100%; display:none; border-radius:16px; margin-bottom:16px;">
      <div id="uploadGroup" class="action-group">
        <label class="btn-ai">📸 영수증 촬영<input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"></label>
        <label class="btn-cancel">🖼 사진 업로드<input type="file" accept="image/*" style="display:none" onchange="handleImg(this)"></label>
      </div>
      <div id="actionGroup" style="display:none;" class="action-group">
        <button class="btn-ai" onclick="runAI()">✨ AI 분석</button>
        <button class="btn-cancel" onclick="resetReceipt()">취소</button>
      </div>
      <div id="resultArea" style="display:none;">
        <div class="table-wrapper">
          <table>
            <thead><tr><th style="width:40px">X</th><th style="width:75px">거래처</th><th>품목</th><th style="width:85px">금액</th><th style="width:65px">분류</th></tr></thead>
            <tbody id="resTable"></tbody>
          </table>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button style="flex: 1; height:58px; border-radius:16px; border:none; background:var(--toss-gray-200);" onclick="resetReceipt()">초기화</button>
          <button style="flex: 2; height:58px; border-radius:16px; border:none; background:#191F28; color:white;" onclick="saveReceipt()">시트에 저장하기</button>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-sheet-overlay" onclick="closeAllSheets()"></div>
  <div class="bottom-sheet" id="reasonSheet">
    <div style="font-size:18px; font-weight:700; margin-bottom:20px;">제외 사유 선택</div>
    <div style="padding:18px; background:var(--toss-gray-100); border-radius:16px; text-align:center; margin-bottom:8px;" onclick="selectReason('부가세 제외')">부가세 제외</div>
    <div style="padding:18px; background:var(--toss-gray-100); border-radius:16px; text-align:center; margin-bottom:8px;" onclick="selectReason('합계 오답')">합계 오답</div>
    <div style="padding:18px; background:#FFEBEE; color:var(--danger); border-radius:16px; text-align:center;" onclick="selectReason('cancel')">취소</div>
  </div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbx7G4_YaiAhPLRW7ccM15aEurQj0f4q0KROsm_V6zwVfrAaIq2lMjcJ0aWOnso3Ildd/exec";
  const WORKER_URL = "https://gemini-proxy.luxuryguy562.workers.dev"; // 본인 Worker 주소
  let b64 = "";
  let currentTargetRowIdx = -1;

  function nav(type) {
    document.querySelectorAll('.container, .nav-item').forEach(e => e.classList.remove('active'));
    document.getElementById(type+'Cont').classList.add('active');
    event.currentTarget.classList.add('active');
  }

  function setLoad(s, t) { 
    document.getElementById('loading').style.display = s ? 'flex' : 'none'; 
    document.getElementById('loadText').innerText = t || ""; 
  }

  function handleImg(input) {
    if(!input.files[0]) return;
    const fr = new FileReader();
    fr.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const cvs = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > 800) { h *= 800/w; w = 800; }
        cvs.width = w; cvs.height = h;
        cvs.getContext('2d').drawImage(img, 0, 0, w, h);
        b64 = cvs.toDataURL('image/jpeg', 0.4).split(',')[1];
        document.getElementById('imgPreview').src = cvs.toDataURL('image/jpeg');
        document.getElementById('imgPreview').style.display = 'block';
        document.getElementById('uploadGroup').style.display = 'none';
        document.getElementById('actionGroup').style.display = 'flex';
      };
      img.src = e.target.result;
    };
    fr.readAsDataURL(input.files[0]);
  }

  async function runAI() {
    setLoad(true, "AI 분석 중...");
    const pmt = `영수증 분석 후 JSON만 출력: [{"date":"YYYY-MM-DD", "vendor":"상호", "item":"품목", "totalPrice":0, "category":"식자재|비품|기타"}]. 상호치환: '논산농협'->'농협','광성탑마트'->'탑마트','홈플러스 논산점'->'홈플러스'.`;
    try {
      const res = await fetch(WORKER_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents: [{ parts: [{ text: pmt }, { inline_data: { mime_type:"image/jpeg", data:b64 }}] }], generationConfig:{response_mime_type:"application/json"}})
      });
      const data = await res.json();
      
      if (!data.candidates) { alert("AI 응답 오류"); return; }
      
      let text = data.candidates[0].content.parts[0].text;
      text = text.replace(/```json|```/g, "").trim();
      const list = JSON.parse(text);

      let html = "";
      list.forEach((i, idx) => {
        html += `<tr id="row-${idx}">
          <td><button class="x-btn" onclick="openReasonSheet(${idx})">X</button></td>
          <td><input type="text" value="${i.vendor}" class="c-v"></td>
          <td><input type="text" value="${i.item}" class="c-i" style="text-align:left;"></td>
          <td><input type="number" value="${i.totalPrice}" class="c-p"></td>
          <td><select class="c-c" style="border:none; background:none;"><option ${i.category==='식자재'?'selected':''}>식자재</option><option ${i.category==='비품'?'selected':''}>비품</option><option>기타</option></select></td>
          <input type="hidden" class="c-d" value="${i.date}">
        </tr>`;
      });
      document.getElementById('resTable').innerHTML = html;
      document.getElementById('resultArea').style.display = 'block';
      document.getElementById('actionGroup').style.display = 'none';
    } catch(e) { alert("분석 실패: " + e.message); } finally { setLoad(false); }
  }

  function resetReceipt() { location.reload(); }
  function openReasonSheet(idx) { currentTargetRowIdx = idx; document.querySelector('.bottom-sheet-overlay').style.display='block'; document.getElementById('reasonSheet').classList.add('show'); }
  function closeAllSheets() { document.querySelectorAll('.bottom-sheet').forEach(s=>s.classList.remove('show')); document.querySelector('.bottom-sheet-overlay').style.display='none'; }
  function selectReason(reason) {
    const tr = document.getElementById('row-' + currentTargetRowIdx);
    const btn = tr.querySelector('.x-btn');
    if (reason === 'cancel') { tr.classList.remove('row-off'); btn.innerText = "X"; }
    else { tr.classList.add('row-off'); btn.innerText = "＋"; tr.dataset.reason = reason; }
    closeAllSheets();
  }

  async function saveReceipt() {
    const rows = Array.from(document.querySelectorAll('#resTable tr')).map(tr => ({
      date: tr.querySelector('.c-d').value, vendor: tr.querySelector('.c-v').value,
      item: tr.querySelector('.c-i').value, totalPrice: tr.querySelector('.c-p').value,
      category: tr.querySelector('.c-c').value,
      note: tr.classList.contains('row-off') ? (tr.dataset.reason || "제외") : "정상"
    }));
    setLoad(true, "저장 중...");
    try { await fetch(GAS_URL, { method:'POST', body: JSON.stringify({ type:'receipt', rows }) }); alert("저장 완료!"); location.reload(); } catch(e) { alert("저장 실패"); } finally { setLoad(false); }
  }
</script>
</body>
</html>
